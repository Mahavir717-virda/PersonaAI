<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>PersonaAI Settings</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 24px; max-width: 420px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 13px; }
    input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 12px; }
    button { padding: 8px 14px; background: #2952e3; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    #status { font-size: 12px; color: #1c7c3f; margin-left: 10px; }
  </style>
</head>
<body>
  <h2>PersonaAI Settings</h2>
  <label for="baseUrl">Backend base URL</label>
  <input id="baseUrl" type="text" placeholder="http://localhost:8000" />
  <button id="saveBtn">Save</button>
  <span id="status"></span>
  <script src="options.js"></script>
</body>
</html>
